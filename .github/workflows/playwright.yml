name: Playwright Tests & Allure Report
on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
    env:
      CI: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: npx playwright test --shard=${{ matrix.shard_index }}/3
      continue-on-error: true

    - name: Upload Allure Raw Results (Shard)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-shard-${{ matrix.shard_index }}
        path: allure-results
        if-no-files-found: warn
        retention-days: 14

  report:
    if: ${{ always() }}
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm

    - name: Install Dependencies
      run: npm ci

    - name: Download Allure Raw Results
      uses: actions/download-artifact@v4
      with:
        pattern: allure-results-shard-*
        merge-multiple: true
        path: allure-results

    - name: Ensure Allure Results Directory
      run: mkdir -p allure-results

    - name: Generate Allure Report
      run: |
        if [ -d allure-results ] && [ "$(ls -A allure-results)" ]; then
          npm run allure:generate
        else
          mkdir -p allure-report
          cat > allure-report/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Allure Report</title>
            </head>
            <body>
              <h1>No Allure results were produced in this run.</h1>
            </body>
          </html>
          EOF
        fi

    - name: Upload Allure HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        if-no-files-found: warn
        retention-days: 14

    - name: Deploy to GitHub Pages
      if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
        enable_jekyll: false
